<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exmouth Tide Times</title>
  <meta name="description" content="Tide times for Exmouth Dock, Devon" />
  <meta name="theme-color" content="#063955" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Exmouth Tides" />

  <link rel="manifest" href="/exmouth-tides/manifest.json" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --deep-sea: #063955;
      --coral-red: #EF4A35;
      --warm-cream: #FFF4D8;
      --soft-cream: #FDFAF2;
      --dark-navy: #032B42;
      --muted: #7a9aaa;
      --border: rgba(6, 57, 85, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--soft-cream);
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 28px,
        rgba(6, 57, 85, 0.022) 28px,
        rgba(6, 57, 85, 0.022) 29px
      );
      color: var(--deep-sea);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark-navy);
      padding: 0.875rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 3px solid var(--coral-red);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header img { height: 38px; width: auto; }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--warm-cream);
      letter-spacing: 0.01em;
    }

    .header-text span {
      font-size: 0.68rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── MAIN ── */
    main { flex: 1; padding-bottom: 2.5rem; }

    /* ── HERO ── */
    .hero {
      background: var(--warm-cream);
      border-bottom: 1px solid rgba(6, 57, 85, 0.1);
      padding-bottom: 1.75rem;
    }

    /* Beach-hut stripe bar */
    .hero-stripe {
      height: 9px;
      background: repeating-linear-gradient(
        90deg,
        var(--coral-red) 0, var(--coral-red) 22px,
        var(--dark-navy) 22px, var(--dark-navy) 44px
      );
      margin-bottom: 1.5rem;
    }

    .hero-inner { padding: 0 1.25rem; }

    .hero-date {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--deep-sea);
      margin-bottom: 0.2rem;
    }

    .hero-location {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.1rem;
    }

    /* tide state pill */
    .tide-state {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(6, 57, 85, 0.07);
      border: 1px solid rgba(6, 57, 85, 0.18);
      color: var(--deep-sea);
      border-radius: 2rem;
      padding: 0.3rem 0.85rem;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      margin-bottom: 1.25rem;
    }

    .tide-state.incoming {
      background: rgba(10, 90, 130, 0.08);
      border-color: rgba(10, 90, 130, 0.25);
      color: #0a5a82;
    }

    .tide-state svg { width: 13px; height: 13px; fill: currentColor; }

    /* ── TIDE GRID — full-width vertical list ── */
    .tide-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* tide row card */
    .tide-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid var(--border);
      border-left: 5px solid rgba(6, 57, 85, 0.2);
      border-radius: 0 10px 10px 0;
      padding: 0.8rem 1.1rem 0.8rem 1rem;
    }

    .tide-card.next-tide {
      border-left-color: var(--coral-red);
      background: #fffbfa;
    }

    .card-left { display: flex; flex-direction: column; gap: 0.1rem; }

    .card-badge {
      font-size: 0.57rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--coral-red);
      min-height: 1em;
    }

    .card-type {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--deep-sea);
      line-height: 1.2;
    }

    .card-day {
      font-size: 0.66rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 0.15rem;
    }

    .card-right { text-align: right; flex-shrink: 0; }

    .card-time {
      font-size: 1.85rem;
      font-weight: 700;
      color: var(--deep-sea);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .card-ht {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.25rem;
      letter-spacing: 0.02em;
    }

    /* ── UPCOMING SECTION ── */
    .upcoming { padding: 1.75rem 1.25rem 0; }

    .section-rule {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .section-rule::before, .section-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .upcoming-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    /* ── ACCORDION ── */
    .day-accordion {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.5rem;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .day-accordion.open {
      border-color: rgba(6, 57, 85, 0.22);
      box-shadow: 0 2px 12px rgba(6, 57, 85, 0.06);
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.1rem;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .day-header:active { opacity: 0.7; }
    .day-header-left { display: flex; flex-direction: column; gap: 0.1rem; }

    .day-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--deep-sea);
    }

    .day-range { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.05em; }

    .day-chevron {
      width: 18px; height: 18px;
      color: var(--muted);
      transition: transform 0.25s;
      flex-shrink: 0;
    }

    .day-accordion.open .day-chevron { transform: rotate(180deg); }

    .day-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.28s ease;
    }

    .day-accordion.open .day-body { grid-template-rows: 1fr; }
    .day-body-inner { overflow: hidden; }
    .day-body-pad { padding: 0 1rem 1rem; }

    .day-tides {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.5rem;
    }

    .mini-tide {
      background: var(--soft-cream);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.7rem;
    }

    .mini-type {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--coral-red);
      margin-bottom: 0.2rem;
    }

    .mini-time {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--deep-sea);
      letter-spacing: -0.01em;
    }

    .mini-ht { font-size: 0.68rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── LOADING / ERROR ── */
    .status-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 3rem 1.25rem;
      text-align: center;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(6, 57, 85, 0.1);
      border-top-color: var(--coral-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-box p { font-size: 0.85rem; color: var(--muted); }
    .error-msg { color: var(--coral-red); font-size: 0.85rem; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem 1.25rem;
      font-size: 0.67rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      border-top: 1px solid var(--border);
    }

    /* ── REFRESH BTN ── */
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--deep-sea);
      border-radius: 6px;
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .refresh-btn:hover { border-color: var(--coral-red); color: var(--coral-red); }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="Exmouth Tides logo" />
  <div class="header-text">
    <h1>Exmouth Tide Times</h1>
    <span>Exmouth Dock &bull; Devon</span>
  </div>
</header>

<main id="app">
  <div class="status-box">
    <div class="spinner"></div>
    <p>Fetching tide times&hellip;</p>
  </div>
</main>

<footer>Data: WorldTides &bull; Datum: LAT &bull; Exmouth Dock 50.6167°N 3.4167°W</footer>

<script>
const API = 'https://www.worldtides.info/api/v3?extremes&lat=50.6167&lon=-3.4167&date=today&days=4&datum=LAT&key=4a299365-ad1c-4f3f-b519-000c72f1b648';
const CACHE_KEY = 'et-tides';
const CACHE_TTL = 12 * 60 * 60 * 1000;

function fmt(sec) {
  return new Date(sec * 1000).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function fmtShort(sec) {
  return new Date(sec * 1000).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function dayKey(sec) {
  const d = new Date(sec * 1000);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function ht(m) { return `${parseFloat(m).toFixed(2)} m`; }

function getTideState(extremes) {
  const now = Date.now() / 1000;
  let prev = null, next = null;
  for (const e of extremes) {
    if (e.dt <= now) prev = e;
    else if (!next) next = e;
  }
  if (!prev || !next) return null;
  return { rising: next.type === 'High' };
}

function render(extremes) {
  const now = Date.now() / 1000;
  const today = todayKey();

  // Next 4 upcoming tides from this moment
  const upcoming = extremes.filter(e => e.dt > now).slice(0, 4);

  // Tide direction state
  const state = getTideState(extremes);

  // Accordion: next 3 non-today calendar days, full day of tides each
  const grouped = {};
  for (const e of extremes) {
    const k = dayKey(e.dt);
    if (k === today) continue;
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(e);
  }
  const futureDays = Object.keys(grouped).slice(0, 3);

  let statePill = '';
  if (state !== null) {
    const arrow = state.rising
      ? `<svg viewBox="0 0 24 24"><path d="M4 20l16-8L4 4v6l8 2-8 2v6z"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M20 4L4 12l16 8v-6l-8-2 8-2V4z"/></svg>`;
    statePill = `<div class="tide-state ${state.rising ? 'incoming' : ''}">
      ${arrow}${state.rising ? 'Tide coming in' : 'Tide going out'}
    </div>`;
  }

  const upcomingCards = upcoming.map((e, i) => {
    const isNext = i === 0;
    const isToday = dayKey(e.dt) === today;
    const dayLabel = isToday
      ? ''
      : new Date(e.dt * 1000).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    return `
      <div class="tide-card ${isNext ? 'next-tide' : ''}">
        <div class="card-left">
          <span class="card-badge">${isNext ? '&#9654;&nbsp;Next tide' : ''}</span>
          <div class="card-type">${e.type === 'High' ? 'High Tide' : 'Low Tide'}</div>
          ${dayLabel ? `<div class="card-day">${dayLabel}</div>` : ''}
        </div>
        <div class="card-right">
          <div class="card-time">${fmt(e.dt)}</div>
          <div class="card-ht">${ht(e.height)}</div>
        </div>
      </div>`;
  }).join('');

  const futureHTML = futureDays.map((k, i) => {
    const day = grouped[k];
    const dt0 = day[0].dt;
    const miniCards = day.map(e => `
      <div class="mini-tide">
        <div class="mini-type">${e.type === 'High' ? 'High' : 'Low'}</div>
        <div class="mini-time">${fmt(e.dt)}</div>
        <div class="mini-ht">${ht(e.height)}</div>
      </div>`).join('');
    return `
      <div class="day-accordion" id="day-${i}">
        <div class="day-header" onclick="toggleDay('day-${i}')">
          <div class="day-header-left">
            <span class="day-name">${new Date(dt0 * 1000).toLocaleDateString('en-GB', { weekday: 'long' })}</span>
            <span class="day-range">${fmtShort(dt0)}</span>
          </div>
          <svg class="day-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="day-body">
          <div class="day-body-inner">
            <div class="day-body-pad">
              <div class="day-tides">${miniCards}</div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-stripe"></div>
      <div class="hero-inner">
        <div class="hero-date">${new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
        <div class="hero-location">Exmouth Dock &bull; Devon</div>
        ${statePill}
        <div class="tide-grid">${upcoming.length
          ? upcomingCards
          : '<p style="color:var(--muted);font-size:.85rem">No upcoming tides found.</p>'
        }</div>
      </div>
    </div>
    <div class="upcoming">
      <div class="section-rule"><span class="upcoming-title">Coming days</span></div>
      ${futureHTML}
    </div>`;
}

function toggleDay(id) {
  document.getElementById(id).classList.toggle('open');
}

async function loadTides() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts < CACHE_TTL) { render(data); return; }
    }
  } catch (_) {}

  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.extremes || !json.extremes.length) throw new Error('No tide data returned');
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: json.extremes }));
    render(json.extremes);
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="status-box">
        <p class="error-msg">Could not load tide data.<br>${err.message}</p>
        <button class="refresh-btn" onclick="location.reload()">Try again</button>
      </div>`;
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/exmouth-tides/sw.js', { scope: '/exmouth-tides/' }).catch(() => {});
}

loadTides();
</script>
</body>
</html>
